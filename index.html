<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
        color: white;
        overflow-x: hidden;
    }

    section {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
    }

    h1, h2 {
        margin-bottom: 20px;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: #ff4d6d;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
    }

    .hidden {
        display: none;
    }

    .cards {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .card {
        width: 120px;
        height: 120px;
        background: rgba(255,255,255,0.1);
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.3s;
        padding: 10px;
    }

    .card:hover {
        background: #ff4d6d;
    }

    .proposal-buttons {
        display: flex;
        gap: 20px;
        margin-top: 20px;
    }

    #noBtn {
        position: relative;
    }

    .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        background: white;
        top: 0;
        animation: fall 3s linear infinite;
    }

    @keyframes fall {
        to {
            transform: translateY(100vh);
        }
    }
</style>
</head>

<body>

<!-- 1. Landing -->
<section id="landing">
    <h1>Hey ❤️</h1>
    <p>I made something for you...</p>
    <br>
    <button onclick="nextSection('story1')">Start</button>
</section>

<!-- 2. Story -->
<section id="story1" class="hidden">
    <h2>The First Time We Met</h2>
    <p>I didn’t know it then… but you were going to change my life forever.</p>
    <br>
    <button onclick="nextSection('story2')">Next</button>
</section>

<!-- 3. Things I Love -->
<section id="story2" class="hidden">
    <h2>Little Things I Love About You</h2>
    <div class="cards">
        <div class="card" onclick="reveal(this)">Your Smile 😊</div>
        <div class="card" onclick="reveal(this)">Your Laugh 😂</div>
        <div class="card" onclick="reveal(this)">Your Kindness ❤️</div>
        <div class="card" onclick="reveal(this)">Everything About You 💫</div>
    </div>
    <br>
    <button onclick="nextSection('game')">Next</button>
</section>

<!-- 4. Mini Game -->
<section id="game" class="hidden">
    <h2>Who Loves You More? 😏</h2>
    <button onclick="showLove()">Me</button>
    <button onclick="showLove()">Still Me</button>
    <p id="loveText"></p>
    <br>
    <button onclick="nextSection('final')">Continue</button>
</section>

<!-- 5. Proposal -->
<section id="final" class="hidden">
    <h1>So... 💍</h1>
    <h2>Will You Be Mine Forever?</h2>

    <div class="proposal-buttons">
        <button onclick="yesClicked()">Yes ❤️</button>
        <button id="noBtn" onmouseover="moveNo()">No 😜</button>
    </div>

    <h2 id="result"></h2>
</section>

<script>
function nextSection(id) {
    document.querySelectorAll("section").forEach(sec => sec.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

function reveal(el) {
    el.innerHTML = "❤️";
}

function showLove() {
    document.getElementById("loveText").innerText = "Obviously... it's me 😎❤️";
}

function moveNo() {
    let btn = document.getElementById("noBtn");
    let x = Math.random() * 200 - 100;
    let y = Math.random() * 200 - 100;
    btn.style.transform = `translate(${x}px, ${y}px)`;
}

function yesClicked() {
    document.getElementById("result").innerText = "I knew it! ❤️✨";
    createConfetti();
}

function createConfetti() {
    for (let i = 0; i < 50; i++) {
        let conf = document.createElement("div");
        conf.classList.add("confetti");
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
        conf.style.animationDuration = (Math.random()*2+2)+"s";
        document.body.appendChild(conf);
    }
}
</script>

</body>
</html>
